name: Create Post from Issue

on:
  issues:
    types:
      - labeled

jobs:
  create_post:
    runs-on: ubuntu-latest
    # Only run when the repo owner adds the 'publish' label.
    if: |
      github.event.label.name == 'publish' &&
      github.event.sender.login == github.repository_owner

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Create Content and Ingest Images
        id: create_file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/publish_issue.py

      - name: Commit and Push New Post and Images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "publish ${{ github.event.issue.title }} from issue #${{ github.event.issue.number }}"
          # Track generated markdown and any ingested issue images.
          file_pattern: "src/content/blog src/content/flashcards public/assets/blog public/assets/flashcards"

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              state: 'closed'
            })
